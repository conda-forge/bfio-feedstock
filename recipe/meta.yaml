{% set name = "bfio" %}
{% set version = "2.4.9" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/PolusAI/{{ name }}/archive/refs/tags/v{{ version }}.tar.gz
  sha256: d1165678e8325ebaabe8f4ad8d268c39e0e70b6f66098a636f75bad0a048e9d4
build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - imagecodecs >=2021.2.26
    - jpype1
    - numpy >=1.20.1
    - ome-types >=0.4.2
    - pip
    - setuptools
    - python {{ python_min }}
    - scyjava
    - tifffile >=2021.8.30
    - zarr >=2.6.1
    - bfiocpp
  run:
    - imagecodecs >=2021.2.26
    - jpype1
    - numpy >=1.20.1
    - ome-types >=0.4.2
    - python >={{ python_min }}
    - scyjava
    - tifffile >=2021.8.30
    - zarr >=2.6.1
    - bfiocpp

test:
  imports:
    - bfio
  commands:
    - pip list
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://pypi.org/project/bfio/
  summary: Simple reading and writing classes for tiled tiffs using Bioformats.
  dev_url: https://github.com/PolusAI/bfio
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Nicholas-Schaub
    - sameeul
    - goanpeca
    - jaimergp
